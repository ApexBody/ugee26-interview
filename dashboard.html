<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Interview Status</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
    <header class="topbar">
        <div class="title">Admin Dashboard</div>
        <nav class="topbar-links">
            <a href="search.html">Search</a>
            <a href="index.html">Board</a>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2 class="dashboard-subtitle">Interview Status Overview</h2>
            <div class="dashboard-meta">
                <span id="total-count" class="total-count">0 Total Students</span>
                <span id="last-updated" class="last-updated">Loading...</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card stat-yet-to-arrive">
                <div class="stat-label">Yet to Arrive</div>
                <div class="stat-count" id="count-yet-to-arrive">0</div>
                <div class="stat-percentage" id="percent-yet-to-arrive">0%</div>
            </div>

            <div class="stat-card stat-registered">
                <div class="stat-label">Registered</div>
                <div class="stat-count" id="count-registered">0</div>
                <div class="stat-percentage" id="percent-registered">0%</div>
            </div>

            <div class="stat-card stat-in-progress">
                <div class="stat-label">In Progress</div>
                <div class="stat-count" id="count-in-progress">0</div>
                <div class="stat-percentage" id="percent-in-progress">0%</div>
            </div>

            <div class="stat-card stat-interview-done">
                <div class="stat-label">Interview Done</div>
                <div class="stat-count" id="count-interview-done">0</div>
                <div class="stat-percentage" id="percent-interview-done">0%</div>
            </div>

            <div class="stat-card stat-completed">
                <div class="stat-label">Completed</div>
                <div class="stat-count" id="count-completed">0</div>
                <div class="stat-percentage" id="percent-completed">0%</div>
            </div>

            <div class="stat-card stat-unknown">
                <div class="stat-label">Unknown Status</div>
                <div class="stat-count" id="count-unknown">0</div>
                <div class="stat-percentage" id="percent-unknown">0%</div>
            </div>
        </div>

        <div class="breakdown-section">
            <h3 class="breakdown-title">Status Breakdown</h3>
            <div class="progress-bar">
                <div class="progress-segment segment-yet-to-arrive" id="bar-yet-to-arrive" style="width: 0%"></div>
                <div class="progress-segment segment-registered" id="bar-registered" style="width: 0%"></div>
                <div class="progress-segment segment-in-progress" id="bar-in-progress" style="width: 0%"></div>
                <div class="progress-segment segment-interview-done" id="bar-interview-done" style="width: 0%"></div>
                <div class="progress-segment segment-completed" id="bar-completed" style="width: 0%"></div>
                <div class="progress-segment segment-unknown" id="bar-unknown" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzJMHzdxuPEidWWJDd8ox4ebtk2fxJQ5sRxXxlC8D5icKrrzrdkmVhRQBiTnzl72WhMmg/exec';
        const POLLING_INTERVAL_MS = 120000; // 2 minutes

        let allCandidates = [];

        const STATUS_KEYS = [
            { key: 'YET TO ARRIVE', id: 'yet-to-arrive' },
            { key: 'REGISTERED', id: 'registered' },
            { key: 'IN PROGRESS', id: 'in-progress' },
            { key: 'INTERVIEW DONE', id: 'interview-done' },
            { key: 'COMPLETED', id: 'completed' },
            { key: 'UNKNOWN', id: 'unknown' }
        ];

        async function fetchCandidateData() {
            document.getElementById('last-updated').textContent = 'Refreshing...';
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                allCandidates = await response.json();
                updateDashboard();
                
                const now = new Date();
                document.getElementById('last-updated').textContent = 
                    `Updated: ${now.toLocaleTimeString()}`;
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('last-updated').textContent = 'Error loading data';
            }
        }

        function normalizeStatus(status) {
            if (!status) return 'UNKNOWN';
            return status.toUpperCase().trim();
        }

        function updateDashboard() {
            // Count students by status
            const counts = {};
            STATUS_KEYS.forEach(status => counts[status.key] = 0);

            allCandidates.forEach(candidate => {
                const status = normalizeStatus(candidate.State);
                if (counts.hasOwnProperty(status)) {
                    counts[status]++;
                } else {
                    counts['UNKNOWN']++;
                }
            });

            const total = allCandidates.length;
            document.getElementById('total-count').textContent = `${total} Total Student${total !== 1 ? 's' : ''}`;

            // Update each stat card
            STATUS_KEYS.forEach(status => {
                const count = counts[status.key];
                const percentage = total > 0 ? ((count / total) * 100).toFixed(1) : 0;

                document.getElementById(`count-${status.id}`).textContent = count;
                document.getElementById(`percent-${status.id}`).textContent = `${percentage}%`;
                
                // Update progress bar segments
                const barElement = document.getElementById(`bar-${status.id}`);
                if (barElement) {
                    barElement.style.width = `${percentage}%`;
                }
            });
        }

        // Initialize
        window.onload = () => {
            fetchCandidateData();
            setInterval(fetchCandidateData, POLLING_INTERVAL_MS);
        };
    </script>
</body>
</html>
