<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Status Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="topbar">
        <div class="title">Interview Status Board</div>
        <nav class="topbar-links">
            <a href="search.html">Search</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <table id="board">
        <thead>
            <tr>
                <th class="id-column">Application Number</th>
                <th class="name-column">Name</th>
                <th class="status-column">Status</th>
            </tr>
        </thead>
        <tbody id="board-body" class="fade">
            </tbody>
    </table>

    <footer id="page-indicator">Loading Data...</footer>

    <script>
        // Redirect mobile users to search page (board is for TV display)
        if (window.innerWidth <= 900 && !window.location.search.includes('force')) {
            window.location.href = 'search.html';
        }

        // --- CONFIGURATION ---
        // Ensure this matches your active deployment URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbzJMHzdxuPEidWWJDd8ox4ebtk2fxJQ5sRxXxlC8D5icKrrzrdkmVhRQBiTnzl72WhMmg/exec';
        
        const ITEMS_PER_PAGE = 15;
        const PAGINATION_INTERVAL_MS = 15000; // 15 seconds per screen
        const POLLING_INTERVAL_MS = 120000;   // 2 minutes
        
        let allCandidates = [];
        let currentPage = 0;
        let paginationTimer;

        // --- DATA FETCHING ---
        async function fetchCandidateData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // Filter logic
                const allowedStatuses = ['REGISTERED', 'IN PROGRESS', 'INTERVIEW DONE'];
                allCandidates = data.filter(candidate => 
                    allowedStatuses.includes(candidate.State)
                );
                
                // Initial load trigger
                if (allCandidates.length > 0 && !paginationTimer) {
                    renderPage();
                    startPaginationLoop();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // --- RENDERING LOGIC ---
        function getStatusClass(state) {
            if (!state) return 'status-unknown';
            const formattedState = state.toLowerCase().replace(/ /g, '-');
            return `status-${formattedState}`;
        }

        function renderPage() {
            if (allCandidates.length === 0) return;

            const totalPages = Math.ceil(allCandidates.length / ITEMS_PER_PAGE);
            
            if (currentPage >= totalPages) currentPage = 0;

            const startIndex = currentPage * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageData = allCandidates.slice(startIndex, endIndex);

            const tbody = document.getElementById('board-body');
            
            // Trigger reflow for CSS animation
            tbody.classList.remove('fade');
            void tbody.offsetWidth; 
            tbody.classList.add('fade');

            // Generate HTML with the new Name column
            tbody.innerHTML = pageData.map(candidate => `
                <tr>
                    <td class="id-column">${candidate.Admission_ID || '---'}</td>
                    <td class="name-column">${candidate.Name || '---'}</td>
                    <td><span class="status ${getStatusClass(candidate.State)}">${candidate.State || 'UNKNOWN'}</span></td>
                </tr>
            `).join('');

            document.getElementById('page-indicator').textContent = `Page ${currentPage + 1} of ${totalPages}`;
            currentPage = (currentPage + 1) % totalPages;
        }

        // --- TIMERS ---
        function startPaginationLoop() {
            paginationTimer = setInterval(renderPage, PAGINATION_INTERVAL_MS);
        }

        window.onload = () => {
            fetchCandidateData(); 
            setInterval(fetchCandidateData, POLLING_INTERVAL_MS); 
        };
    </script>
</body>
</html>
