<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Status Board</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-yellow: #f0e68c;
            --header-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 2vw;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Prevents scrollbars on TV */
        }

        header {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #30363d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            flex-grow: 1;
            table-layout: fixed;
        }

        th {
            background-color: var(--header-bg);
            color: #8b949e;
            font-size: 1.8rem;
            text-align: left;
            padding: 15px 20px;
            text-transform: uppercase;
        }

        td {
            font-size: 2.2rem;
            font-weight: bold;
            padding: 12px 20px;
            border-bottom: 1px solid #21262d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Prevents long names from breaking the layout */
        }

        /* Status Colors */
        .status-yet-to-arrive { color: #dc3545; }
        .status-registered { color: #28a745; }
        .status-in-progress { color: #007bff; }
        .status-interview-done { color: #ffc107; }
        .status-completed { color: #dc3545; }

        /* Adjusted Column Widths */
        .id-column { width: 25%; color: var(--accent-yellow); }
        .name-column { width: 45%; color: var(--text-color); }
        .status-column { width: 30%; }

        footer {
            margin-top: 20px;
            text-align: right;
            font-size: 1.5rem;
            color: #8b949e;
        }

        /* Simple fade animation for transitions */
        .fade {
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>Interview Status Board</header>

    <table id="board">
        <thead>
            <tr>
                <th class="id-column">Admission ID</th>
                <th class="name-column">Name</th>
                <th class="status-column">Status</th>
            </tr>
        </thead>
        <tbody id="board-body" class="fade">
            </tbody>
    </table>

    <footer id="page-indicator">Loading Data...</footer>

    <script>
        // --- CONFIGURATION ---
        // Ensure this matches your active deployment URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbzJMHzdxuPEidWWJDd8ox4ebtk2fxJQ5sRxXxlC8D5icKrrzrdkmVhRQBiTnzl72WhMmg/exec';
        
        const ITEMS_PER_PAGE = 15;
        const PAGINATION_INTERVAL_MS = 15000; // 15 seconds per screen
        const POLLING_INTERVAL_MS = 120000;   // 2 minutes
        
        let allCandidates = [];
        let currentPage = 0;
        let paginationTimer;

        // --- DATA FETCHING ---
        async function fetchCandidateData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // Filter logic
                const allowedStatuses = ['REGISTERED', 'IN PROGRESS', 'INTERVIEW DONE'];
                allCandidates = data.filter(candidate => 
                    allowedStatuses.includes(candidate.State)
                );
                
                // Initial load trigger
                if (allCandidates.length > 0 && !paginationTimer) {
                    renderPage();
                    startPaginationLoop();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // --- RENDERING LOGIC ---
        function getStatusClass(state) {
            const formattedState = state.toLowerCase().replace(/ /g, '-');
            return `status-${formattedState}`;
        }

        function renderPage() {
            if (allCandidates.length === 0) return;

            const totalPages = Math.ceil(allCandidates.length / ITEMS_PER_PAGE);
            
            if (currentPage >= totalPages) currentPage = 0;

            const startIndex = currentPage * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const pageData = allCandidates.slice(startIndex, endIndex);

            const tbody = document.getElementById('board-body');
            
            // Trigger reflow for CSS animation
            tbody.classList.remove('fade');
            void tbody.offsetWidth; 
            tbody.classList.add('fade');

            // Generate HTML with the new Name column
            tbody.innerHTML = pageData.map(candidate => `
                <tr>
                    <td class="id-column">${candidate.Admission_ID || '---'}</td>
                    <td class="name-column">${candidate.Name || '---'}</td>
                    <td class="${getStatusClass(candidate.State)}">${candidate.State || 'UNKNOWN'}</td>
                </tr>
            `).join('');

            document.getElementById('page-indicator').textContent = `Page ${currentPage + 1} of ${totalPages}`;
            currentPage = (currentPage + 1) % totalPages;
        }

        // --- TIMERS ---
        function startPaginationLoop() {
            paginationTimer = setInterval(renderPage, PAGINATION_INTERVAL_MS);
        }

        window.onload = () => {
            fetchCandidateData(); 
            setInterval(fetchCandidateData, POLLING_INTERVAL_MS); 
        };
    </script>
</body>
</html>
