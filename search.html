<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Interview Status</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="search-page">
    <header class="topbar">
        <div class="title">Search Interview Status</div>
        <nav class="topbar-links">
            <a href="index.html">Board</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <section class="search-panel">
        <label class="search-label" for="search-input">Search by name or admission ID</label>
        <div class="search-row">
            <input
                id="search-input"
                class="search-input"
                type="text"
                placeholder="Type a name or ID"
                autocomplete="off"
            >
            <button id="clear-search" class="search-button" type="button">Clear</button>
        </div>
        <div class="search-meta">
            <span id="results-count">0 results</span>
            <span id="status-message">Loading data...</span>
        </div>
    </section>

    <table id="search-results">
        <thead>
            <tr>
                <th class="id-column">Admission ID</th>
                <th class="name-column">Name</th>
                <th class="status-column">Status</th>
            </tr>
        </thead>
        <tbody id="results-body" class="fade">
        </tbody>
    </table>

    <script>
        // --- CONFIGURATION ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzJMHzdxuPEidWWJDd8ox4ebtk2fxJQ5sRxXxlC8D5icKrrzrdkmVhRQBiTnzl72WhMmg/exec';
        const POLLING_INTERVAL_MS = 120000;

        let allCandidates = [];

        const searchInput = document.getElementById('search-input');
        const resultsBody = document.getElementById('results-body');
        const resultsCount = document.getElementById('results-count');
        const statusMessage = document.getElementById('status-message');
        const clearButton = document.getElementById('clear-search');

        async function fetchCandidateData() {
            statusMessage.textContent = 'Refreshing data...';
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                allCandidates = data;
                statusMessage.textContent = 'Ready';
                filterAndRender();
            } catch (error) {
                console.error('Error fetching data:', error);
                statusMessage.textContent = 'Unable to load data';
            }
        }

        function getStatusClass(state) {
            if (!state) return 'status-unknown';
            const formattedState = state.toLowerCase().replace(/ /g, '-');
            return `status-${formattedState}`;
        }

        function normalizeValue(value) {
            return String(value || '').toLowerCase();
        }

        function filterCandidates(query) {
            const normalizedQuery = normalizeValue(query).trim();
            if (!normalizedQuery) {
                return allCandidates;
            }

            return allCandidates.filter(candidate => {
                const name = normalizeValue(candidate.Name);
                const id = normalizeValue(candidate.Admission_ID);
                return name.includes(normalizedQuery) || id.includes(normalizedQuery);
            });
        }

        function renderResults(results, query) {
            resultsBody.classList.remove('fade');
            void resultsBody.offsetWidth;
            resultsBody.classList.add('fade');

            const table = document.getElementById('search-results');
            const trimmedQuery = String(query || '').trim();

            if (results.length === 0) {
                const emptyMessage = trimmedQuery
                    ? 'No matches found for your search'
                    : 'No participants available';

                resultsBody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="3">${emptyMessage}</td>
                    </tr>
                `;
                table.classList.add('is-empty');
            } else {
                resultsBody.innerHTML = results.map(candidate => `
                    <tr>
                        <td class="id-column">${candidate.Admission_ID || '---'}</td>
                        <td class="name-column">${candidate.Name || '---'}</td>
                        <td><span class="status ${getStatusClass(candidate.State)}">${candidate.State || 'UNKNOWN'}</span></td>
                    </tr>
                `).join('');
                table.classList.remove('is-empty');
            }

            resultsCount.textContent = `${results.length} result${results.length === 1 ? '' : 's'}`;
        }

        function filterAndRender() {
            const query = searchInput.value;
            const results = filterCandidates(query);
            renderResults(results, query);
        }

        searchInput.addEventListener('input', filterAndRender);
        clearButton.addEventListener('click', () => {
            searchInput.value = '';
            filterAndRender();
            searchInput.focus();
        });

        window.onload = () => {
            fetchCandidateData();
            setInterval(fetchCandidateData, POLLING_INTERVAL_MS);
        };
    </script>
</body>
</html>
